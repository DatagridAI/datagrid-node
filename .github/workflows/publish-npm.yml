name: Publish to npm

on:
  workflow_dispatch:

  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - run: yarn install

      - run: yarn build

      - name: Determine dist-tag
        id: tag
        run: |
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          VERSION=$(node -p "require('./package.json').version")

          # Only use a scoped prerelease tag when a stable version already exists on npm.
          # Before the first stable release, prereleases also go to `latest` (matches old bin/publish-npm behavior).
          TAG="latest"
          if [[ "$VERSION" =~ -([a-zA-Z]+) ]]; then
            NPM_INFO=$(npm view "$PACKAGE_NAME" version --json 2>/dev/null || true)
            LAST_VERSION=$(echo "$NPM_INFO" | jq -r 'if type == "string" then . else "" end' 2>/dev/null || true)
            if [[ -n "$LAST_VERSION" && ! "$LAST_VERSION" =~ -([a-zA-Z]+) ]]; then
              TAG="${BASH_REMATCH[1]}"
            fi
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - run: npm publish --provenance --tag ${{ steps.tag.outputs.tag }}
        working-directory: dist
        env:
          NODE_AUTH_TOKEN: ${{ secrets.DATAGRID_NPM_TOKEN || secrets.NPM_TOKEN }}
